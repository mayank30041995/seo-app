version: 2.1

jobs:
  deploy:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout

      - add_ssh_keys

      - run:
          name: Deploy
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@3.120.129.83 '
              cd ~/seo-app &&
              git pull &&
              cd client &&
              npm run build &&
              pm2 restart frontend &&
              pm2 restart backend &&
              pm2 save
            '

workflows:
  deploy:
    jobs:
      - deploy
